name: nsg_generator
description: A simple command-line application.
# version: 1.0.0
# homepage: https://www.example.com

environment:
  # Кросс-SDK constraint (вариант A в TASK01 §«Чек-лист совместимости»):
  # пакет работает и на Dart 2.18+, и на Dart 3.x. Существующие потребители
  # на Dart 2.18 не ломаются.
  # Эмпирическая сверка детерминизма Dart 2 vs Dart 3 на реальном GeneratorConfig
  # — на моменте написания не сделана (Dart 2 SDK локально не установлен).
  # Любая правка SchemaHash.canonicalize обязана включать прогон на обеих версиях.
  sdk: '>=2.18.1 <4.0.0'


dependencies:
  path: ^1.8.2
  unorm_dart: ^0.3.0

dev_dependencies:
  test: ^1.21.0